<!DOCTYPE HTML>
<html lang="en">
<head>
<meta charset="utf-8">

<title>Mult-Region Combination</title>
<link rel="icon" type="image/x-icon" href="images/EnMesh.ico">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js"crossorigin="anonymous"></script>

</head>
<body>

<div class="container text-center">
<!-- 導覽列 -->
<div id="content-container">
<!-- 主選單內容載入 -->
</div>

<!-- ============= COMPONENT END// ============== -->

<section class="section-content py-5">

    <img src="./images/Multi_2a.png"><br><hr>
	<img src="./images/Multi_2b.png"><br><hr>
    <img src="./images/Multi_3.png"><br><hr>
    <img src="./images/Multi_3b.png"><br><hr>
    <img src="./images/Multi_4a.png"><br><hr>
	<img src="./images/Multi_4a.png"><br>

</section>

</div><!-- container //  -->

    <a href="#" id="backToTop">TOP &#129137;</a>

    <script>
        // 獲取按鈕
        let backToTop = document.getElementById("backToTop");

        // 監聽滾動事件
        window.onscroll = function() {
            if (document.documentElement.scrollTop > 300) {
                backToTop.style.display = "block"; // 顯示按鈕
            } else {
                backToTop.style.display = "none"; // 隱藏按鈕
            }
        };

        // 點擊時平滑滾動到頂部
        backToTop.addEventListener("click", function(event) {
            event.preventDefault(); // 防止直接跳轉
            window.scrollTo({ top: 0, behavior: "smooth" });
        });
    </script>
	
<!-- footer -->
<div id="footer-container"></div>
	
<script>
  fetch('header.html')
    .then(response => {
      if (!response.ok) throw new Error('無法載入檔案');
      return response.text();
    })
    .then(htmlText => {
      document.getElementById('content-container').innerHTML = htmlText;
    })
    .catch(error => {
      console.error('載入內容時出錯:', error);
    });
</script>

<!-- footer.html)-->
<script>
  // 獲取外部檔案的內容
  fetch('footer.html')
    .then(response => {
      // 確保回應成功
      if (!response.ok) {
        throw new Error('無法載入檔案');
      }
      // 將回應解析為純文字
      return response.text();
    })
    .then(htmlText => {
      // 找到容器元素並將獲取的 HTML 文字設定為其內容
      document.getElementById('footer-container').innerHTML = htmlText;
    })
    .catch(error => {
      console.error('載入內容時出錯:', error);
      document.getElementById('footer-container').innerHTML = '<p>載入內容失敗。</p>';
    });
</script>

</body>
</html>
